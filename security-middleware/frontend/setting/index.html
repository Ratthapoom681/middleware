<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings – Middleware</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="animate-fade-in">
                <!-- Section Tabs -->
                <div class="settings-tabs" id="settings-tabs">
                    <button class="settings-tab active" data-section="wazuh">Wazuh</button>
                    <button class="settings-tab" data-section="defectdojo">DefectDojo</button>
                    <button class="settings-tab" data-section="redmine">Redmine</button>
                    <button class="settings-tab" data-section="pipeline">Pipeline</button>
                    <button class="settings-tab" data-section="filter">Filter</button>
                    <button class="settings-tab" data-section="dedup">Dedup</button>
                    <button class="settings-tab" data-section="enrichment">Enrichment</button>
                    <button class="settings-tab" data-section="severity_map">Severity Map</button>
                    <button class="settings-tab" data-section="storage">Storage</button>
                    <button class="settings-tab" data-section="logging">Logging</button>
                </div>

                <!-- Settings Form -->
                <div class="card settings-card">
                    <div class="card-header">
                        <h3 id="settings-section-title">Wazuh Settings</h3>
                        <button class="btn btn-primary" onclick="saveCurrentSection()">
                            <i class="ph-bold ph-floppy-disk"></i> Save
                        </button>
                    </div>
                    <div id="settings-form-container">
                        <div class="loading-placeholder">Loading settings…</div>
                    </div>
                </div>

                <!-- Maintenance -->
                <div class="card mt-md">
                    <div class="card-header"><h3><i class="ph-bold ph-wrench"></i> Maintenance</h3></div>
                    <div class="maintenance-actions">
                        <button class="btn btn-secondary" onclick="doBackup('full')"><i class="ph-bold ph-database"></i> Full Backup</button>
                        <button class="btn btn-secondary" onclick="doBackup('config')"><i class="ph-bold ph-gear-six"></i> Config Backup</button>
                        <button class="btn btn-danger" onclick="doCleanup()"><i class="ph-bold ph-trash"></i> Cleanup Data</button>
                    </div>
                    <div id="retention-status" style="padding:0.75rem 1.25rem;font-size:0.85rem;color:var(--text-muted)"></div>
                </div>

                <!-- Backups -->
                <div class="card mt-md">
                    <div class="card-header">
                        <h3><i class="ph-bold ph-archive"></i> Backups</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <select id="cleanup-type" class="btn-sm" style="padding: 0.35rem 0.5rem; height: 32px; font-size: 0.75rem;">
                                <option value="all">Everything</option>
                                <option value="full">Full Only</option>
                                <option value="config">Config Only</option>
                            </select>
                            <button class="btn btn-secondary btn-sm" onclick="loadBackups()" title="Refresh list">
                                <i class="ph-bold ph-arrow-clockwise"></i>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="doDeleteBackups()">
                                <i class="ph-bold ph-trash"></i> Cleanup
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>Filename</th><th>Size</th><th>Created</th><th>Action</th></tr></thead>
                            <tbody id="backups-body">
                                <tr><td colspan="4" class="loading-placeholder">Loading…</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../shared/components.js?v=2"></script>
    <script src="../shared/api.js?v=2"></script>
    <script src="setting.js?v=2"></script>
</body>
</html>
