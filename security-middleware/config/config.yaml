# ============================================================
# Security Middleware Pipeline - Configuration
# ============================================================

# --- Wazuh SIEM ---
wazuh:
  base_url: https://10.145.10.57:55000
  min_level: 4
  password: jzU6&kfabdSH
  username: wazuh-api
  verify_ssl: false

# --- DefectDojo Vulnerability Management ---
defectdojo:
  active: true
  api_key: Token changeme
  base_url: https://defectdojo.example.com/api/v2
  cursor_path: data/defectdojo_cursor.json
  enabled: true
  engagement_ids: []
  fetch_limit: 1000
  product_ids: []
  severity_filter:
  - Critical
  - High
  - Medium
  test_ids: []
  updated_since_minutes: 0
  verified: true
  verify_ssl: true

# --- Redmine Issue Tracker ---
redmine:
  api_key: changeme
  base_url: https://redmine.example.com
  dedup_custom_field_id: null
  enable_parent_issues: true
  parent_tracker_id: null
  priority_map:
    critical: 5
    high: 4
    medium: 3
    low: 2
    info: 1
  project_id: security-incidents
  routing_rules: []
  tracker_id: 1

# --- Pipeline Settings ---
pipeline:
  dedup:
    db_path: data/dedup.db
    enabled: true
    ttl_hours: 168
  delivery:
    async_enabled: false
    recheck_ttl_minutes: 15
    retry_delay_seconds: 60
    store_first_ingest: false
    worker_batch_size: 25
    worker_poll_interval: 10
  detection:
    alert_ttl_hours: 168
    db_path: data/detection_alerts.db
    enabled: true
    max_state_entries: 10000
    rules:
    - cooldown_seconds: 300
      create_ticket: true
      enabled: true
      name: Brute Force Login Detection
      parameters:
        event_type_field: data.status
        event_type_value: failed
        group_by: srcip
        threshold: 5
        window_seconds: 300
      severity: high
      type: brute_force
    - cooldown_seconds: 60
      create_ticket: false
      enabled: true
      name: Suspicious Port Connection
      parameters:
        port_field: dstport
        suspicious_ports:
        - 4444
        - 1337
        - 31337
        - 6666
        - 6667
        - 12345
        - 65535
      severity: medium
      type: abnormal_port
    - cooldown_seconds: 600
      create_ticket: false
      enabled: true
      name: Impossible Travel Detection
      parameters:
        group_by: user
        max_travel_seconds: 3600
        window_seconds: 7200
      severity: critical
      type: impossible_travel
    - cooldown_seconds: 300
      create_ticket: false
      enabled: true
      name: Port Scan Detection
      parameters:
        group_by: srcip
        port_field: dstport
        threshold: 15
        window_seconds: 60
      severity: high
      type: port_scan
  enrichment:
    add_remediation_links: true
    asset_inventory_enabled: false
    asset_inventory_path: config/assets.yaml
  filter:
    default_action: keep
    exclude_rule_ids: []
    exclude_title_patterns:
    - ^Syscheck.*
    include_hosts: []
    json_rules:
    - action: drop
      conditions:
      - op: exists
        path: detection_alert
        value: false
      enabled: true
      match: all
      name: drop-raw-wazuh-events
      source: wazuh
    - action: drop
      conditions:
      - op: equals
        path: data.status
        value: failed
      - op: contains
        path: rule.groups
        value: authentication_failed
      - op: regex
        path: rule.description
        value: failed.*login|login.*failed
      enabled: true
      match: any
      name: drop-raw-wazuh-failed-logins
      source: wazuh
    min_severity: low
  initial_lookback_minutes: 1440
  poll_interval: 300

# --- Shared State Storage ---
storage:
  backend: local
  checkpoint_table: middleware_checkpoints
  dedup_table: middleware_seen_hashes
  ingest_event_table: middleware_ingest_events
  outbound_queue_table: middleware_outbound_queue
  postgres_dsn: ''
  postgres_schema: public
  ticket_state_table: middleware_ticket_state

# --- Logging ---
logging:
  format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
  level: INFO

