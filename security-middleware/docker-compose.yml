services:
  postgres:
    image: postgres:16-alpine
    container_name: middleware-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: middleware
      POSTGRES_USER: middleware
      POSTGRES_PASSWORD: middleware_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U middleware -d middleware"]
      interval: 10s
      timeout: 5s
      retries: 5

  middleware:
    build: .
    container_name: security-middleware
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://middleware:middleware_secret@postgres:5432/middleware"
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: "INFO"
      LOG_FILE: "data/logs/middleware.log"
    volumes:
      # Mount config for easy editing from host and web UI saving
      - ./config:/app/config
      # Persist data (logs, backups, local dedup DB)
      - middleware-data:/app/data
      # Uncomment if Wazuh is running on the Docker host:
      # - /var/ossec/logs/alerts:/var/ossec/logs/alerts:ro

volumes:
  middleware-data:
    driver: local
  postgres-data:
    driver: local
