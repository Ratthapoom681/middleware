version: "3.8"

services:
  middleware:
    build: .
    container_name: security-middleware
    restart: unless-stopped
    volumes:
      # Mount config for easy editing without rebuilding
      - ./config:/app/config:ro
      # Persist the dedup SQLite database
      - middleware-data:/app/data
    environment:
      # Override credentials via environment variables (recommended for production)
      - WAZUH_BASE_URL=${WAZUH_BASE_URL:-https://wazuh.example.com:55000}
      - WAZUH_USERNAME=${WAZUH_USERNAME:-wazuh-api-user}
      - WAZUH_PASSWORD=${WAZUH_PASSWORD:-changeme}
      - DEFECTDOJO_BASE_URL=${DEFECTDOJO_BASE_URL:-https://defectdojo.example.com/api/v2}
      - DEFECTDOJO_API_KEY=${DEFECTDOJO_API_KEY:-Token changeme}
      - REDMINE_BASE_URL=${REDMINE_BASE_URL:-https://redmine.example.com}
      - REDMINE_API_KEY=${REDMINE_API_KEY:-changeme}
    # Optional: run in single-cycle mode for testing
    # command: ["--once"]

volumes:
  middleware-data:
    driver: local
