version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: security-middleware-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: middleware
      POSTGRES_PASSWORD: middleware
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U middleware -d security"]
      interval: 10s
      timeout: 5s
      retries: 5

  middleware:
    build: .
    container_name: security-middleware
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount config for easy editing from host and web UI saving
      - ./config:/app/config
      # Persist the dedup SQLite database
      - middleware-data:/app/data
      # Mount Wazuh alerts log for direct file reading
      - /var/ossec/logs/alerts:/var/ossec/logs/alerts:ro
    # Environment variables removed to allow Web UI config.yaml to take precedence
    # Optional: run in single-cycle mode for testing
    # command: ["--once"]

volumes:
  middleware-data:
    driver: local
  postgres-data:
    driver: local
